<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>
  <style>
    :root {
      --ink-blue: #1F5A93;
      --powder-blue: #B8CFE3;
      --dusty-blue: #7D97AA;
      --soft-white: #F8FAF7;
      --champagne: #B6A36A;
      --text: #263849;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      color: var(--text);
      background: linear-gradient(180deg, #ffffff 0%, var(--soft-white) 55%, #edf5fb 100%);
      font-family: Georgia, "Times New Roman", serif;
      text-align: center;
    }
    .card {
      width: min(680px, 92vw);
      padding: 56px 36px;
      border-radius: 34px;
      border: 1px solid rgba(184, 207, 227, 0.72);
      background: rgba(255,255,255,0.86);
      box-shadow: 0 22px 60px rgba(31, 90, 147, 0.15);
    }
    h1 {
      margin: 0 0 14px;
      color: var(--ink-blue);
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 400;
    }
    p {
      margin: 0 auto 28px;
      max-width: 520px;
      font-family: Arial, sans-serif;
      line-height: 1.7;
    }
    a {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 999px;
      background: var(--ink-blue);
      color: white;
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank You</h1>
    <p>Your RSVP has been received. We are so excited to celebrate with you.</p>
    <a href="index.html">Back to Wedding Website</a>
  </div>
</body>
</html>
